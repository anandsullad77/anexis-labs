name: Website Quality Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  html-and-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate HTML and internal links
        uses: anishathalye/proof-html@v2
        with:
          directory: .
          check_html: true
          enforce_https: false
          disable_external: true
